<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons: modern browsers prefer SVG (crisp at any size); .ico kept for older
         Windows browsers; PNG sizes for the explicit fallback path; apple-touch-icon
         for iOS pinned tabs. All generated from favicon.svg. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KitsuneCommand - Server Management</title>

    <!-- Primary meta: shown in search snippets + as fallback by anything
         that doesn't read OpenGraph. Mirrors the README tagline. -->
    <meta
      name="description"
      content="Web-based server management for 7 Days to Die. Monitoring, management, map."
    />

    <!-- OpenGraph: Discord / Facebook / generic embedders. The image
         is 1774×887 (≈ 1.91:1 — the recommended OG ratio). og:url
         intentionally omitted: panels are self-hosted, so there's no
         canonical URL we can hardcode here. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KitsuneCommand — Server Management" />
    <meta
      property="og:description"
      content="Web-based server management for 7 Days to Die. Monitoring, management, map."
    />
    <meta property="og:image" content="/social.png" />
    <meta property="og:image:width" content="1774" />
    <meta property="og:image:height" content="887" />
    <meta property="og:image:alt" content="KitsuneCommand panel" />

    <!-- Twitter / X card: large-image style since the asset is wide
         enough to look right. Reuses the same image + copy. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KitsuneCommand — Server Management" />
    <meta
      name="twitter:description"
      content="Web-based server management for 7 Days to Die. Monitoring, management, map."
    />
    <meta name="twitter:image" content="/social.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
